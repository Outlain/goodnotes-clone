services:
  inkflow:
    # Pull the prebuilt container from GHCR for production/self-hosted deploys.
    image: ghcr.io/outlain/goodnotes-clone:latest
    # If you want Compose to build from the local checkout instead, uncomment this:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Container listening port
      PORT: "3000"
      # Keep app data inside the mounted persistent volume
      DATA_DIR: /app/data
      # Replace this with your own long random secret before deploying
      SESSION_SECRET: change-this-to-a-long-random-secret
      # Optional. Leave blank to disable the login screen
      APP_PASSWORD: ""
    volumes:
      # This is the only persistent mount the app needs.
      # The app will create the SQLite database and upload folders inside it on first start.
      - ./data:/app/data
    restart: unless-stopped
