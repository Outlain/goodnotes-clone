services:
  inkflow:
    # Pull the prebuilt container from GHCR for production/self-hosted deploys.
    image: ghcr.io/outlain/goodnotes-clone:latest
    # If you want Compose to build from the local checkout instead, uncomment this:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Container listening port
      PORT: "3000"
      # Keep app data inside the mounted persistent volume
      DATA_DIR: /app/data
      # Raise this if you want to accept very large textbook/workbook PDFs
      PDF_UPLOAD_LIMIT_MB: "512"
      # Keep this on to linearize large uploads when qpdf is available in the container
      PDF_LINEARIZE_UPLOADS: "true"
      # Re-optimize already-stored PDFs in the background on startup
      PDF_OPTIMIZE_EXISTING_ON_STARTUP: "true"
      # Number of first pages to pre-generate as cached preview images
      PDF_PREGENERATE_PREVIEW_COUNT: "8"
      # Width of cached sidebar/page preview images in pixels
      PDF_THUMBNAIL_WIDTH: "240"
      # Comma-separated cached preview widths for multi-resolution first-open placeholders
      PDF_PAGE_PREVIEW_WIDTHS: "240,1000,1400"
      # Replace this with your own long random secret before deploying
      SESSION_SECRET: change-this-to-a-long-random-secret
      # Optional. Leave blank to disable the login screen
      APP_PASSWORD: ""
    volumes:
      # This is the only persistent mount the app needs.
      # The app will create the SQLite database and upload folders inside it on first start.
      - ./data:/app/data
    restart: unless-stopped
